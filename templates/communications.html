<!DOCTYPE html>
<html>
  <head>
    <title>Communications Center</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Inter, Arial, sans-serif;
      }

      body {
        background: #f8fafc;
        color: #111827;
        padding: 30px;
      }

      .header {
        margin-bottom: 30px;
      }

      .header h1 {
        font-size: 34px;
        font-weight: 700;
        margin-bottom: 6px;
      }

      .header p {
        color: #6b7280;
      }

      /* KPI */

      .kpi-row {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
        margin-bottom: 30px;
      }

      .kpi-card {
        background: white;
        border: 1px solid #e5e7eb;
        border-radius: 18px;
        padding: 24px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      }

      .kpi-card h3 {
        font-size: 14px;
        color: #6b7280;
        margin-bottom: 10px;
      }

      .kpi-card h1 {
        font-size: 34px;
        font-weight: 700;
        color: #111827;
      }

      /* TICKETS */

      .ticket {
        background: white;
        border: 1px solid #e5e7eb;
        border-radius: 18px;
        padding: 24px;
        margin-bottom: 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        transition: 0.2s;
      }

      .ticket:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
      }

      .ticket h3 {
        font-size: 20px;
        margin-bottom: 8px;
      }

      .ticket div {
        color: #374151;
      }

      /* PRIORITIES */

      .priority-high {
        display: inline-block;
        padding: 6px 12px;
        background: #fee2e2;
        color: #dc2626;
        border-radius: 20px;
        font-weight: 600;
      }

      .priority-medium {
        display: inline-block;
        padding: 6px 12px;
        background: #fef3c7;
        color: #d97706;
        border-radius: 20px;
        font-weight: 600;
      }

      .priority-low {
        display: inline-block;
        padding: 6px 12px;
        background: #dcfce7;
        color: #16a34a;
        border-radius: 20px;
        font-weight: 600;
      }

      /* BUTTON */

      .open-btn {
        background: #1a73e8;
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 600;
      }

      .open-btn:hover {
        background: #1557b0;
      }

      /* MODAL */

      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(17, 24, 39, 0.55);
        backdrop-filter: blur(5px);
        z-index: 9999;
      }

      .modal-content {
        background: white;
        width: 95%;
        max-width: 800px;
        margin: 40px auto;
        padding: 30px;
        border-radius: 24px;
        border: 1px solid #e5e7eb;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
      }

      .modal-content h2 {
        color: #111827;
        margin-bottom: 10px;
      }

      /* INFO CARDS */

      .modal-content > div {
        background: #f9fafb !important;
        color: #111827;
        border: 1px solid #e5e7eb;
      }

      /* TEXTAREA */

      textarea {
        width: 100%;
        height: 140px;
        padding: 14px;
        background: white;
        color: #111827;
        border: 1px solid #d1d5db;
        border-radius: 12px;
        resize: none;
      }

      textarea:focus {
        outline: none;
        border-color: #1a73e8;
      }

      /* BUTTONS */

      .btn {
        padding: 12px 18px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 600;
      }

      .reply-btn {
        background: #16a34a;
        color: white;
      }

      .reply-btn:hover {
        background: #15803d;
      }

      .close-btn {
        background: #dc2626;
        color: white;
      }

      .close-btn:hover {
        background: #b91c1c;
      }

      .btn:not(.reply-btn):not(.close-btn) {
        background: #e5e7eb;
        color: #111827;
      }

      /* MOBILE */

      @media (max-width: 768px) {
        body {
          padding: 15px;
        }

        .kpi-row {
          grid-template-columns: 1fr;
        }

        .ticket {
          flex-direction: column;
          align-items: flex-start;
          gap: 15px;
        }

        .ticket button {
          width: 100%;
        }

        .modal-content {
          margin: 15px;
          padding: 20px;
          max-height: 90vh;
          overflow: auto;
        }

        .btn {
          width: 100%;
          margin-bottom: 10px;
        }

        #actionArea {
          display: flex;
          flex-direction: column;
        }

        .header h1 {
          font-size: 28px;
        }
      }
    </style>
  </head>

  <body>
    <div class="header">
      <h1>💬 Communications Center</h1>
      <p>Manage customer conversations and support tickets</p>
    </div>

    <div class="kpi-row">
      <div class="kpi-card">
        <h3>Open Tickets</h3>
        <h1 id="openCount">0</h1>
      </div>

      <div class="kpi-card">
        <h3>High Priority</h3>
        <h1 id="highCount">0</h1>
      </div>

      <div class="kpi-card">
        <h3>Medium Priority</h3>
        <h1 id="mediumCount">0</h1>
      </div>

      <div class="kpi-card">
        <h3>Closed</h3>
        <h1 id="closedCount">0</h1>
      </div>
    </div>

    <div id="ticketList"></div>
    <div id="ticketModal" class="modal">
      <div class="modal-content">
        <div
          style="
            background: #1f2937;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
          "
        >
          <h2 id="companyName"></h2>

          <br />

          <div>
            <b>Subject:</b>
            <span id="subject"></span>
          </div>

          <br />

          <div>
            <b>Priority:</b>
            <span id="priorityText"></span>
          </div>

          <br />

          <div>
            <b>Status:</b>
            <span id="statusText"></span>
          </div>
        </div>

        <div
          style="
            background: #1f2937;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
          "
        >
          <b>Customer Message</b>

          <br /><br />

          <div id="customerMessage"></div>
        </div>

        <textarea id="agentReply" placeholder="Type reply here..."></textarea>

        <br /><br />

        <div id="actionArea">
          <button class="btn reply-btn" onclick="sendReply()">
            Send Reply
          </button>

          <button class="btn close-btn" onclick="closeTicket()">
            Close Ticket
          </button>

          <button class="btn" onclick="hideModal()">Cancel</button>
        </div>
      </div>
    </div>

    <script>
      let tickets = [];
      let selectedTicket = null;

      function updateKPIs() {
        document.getElementById("openCount").innerText = tickets.filter(
          (t) => (t.status || "").toLowerCase() === "open"
        ).length;

        document.getElementById("highCount").innerText = tickets.filter(
          (t) => (t.priority || "").toLowerCase() === "high"
        ).length;

        document.getElementById("mediumCount").innerText = tickets.filter(
          (t) => (t.priority || "").trim().toLowerCase() === "medium"
        ).length;

        document.getElementById("closedCount").innerText = tickets.filter(
          (t) => (t.status || "").trim().toLowerCase() === "closed"
        ).length;
      }

      async function loadTickets() {
        const res = await fetch("/communications-data");

        tickets = await res.json();

        console.log("ALL TICKETS", tickets);
        updateKPIs();

        let html = "";

        tickets.forEach((ticket, index) => {
          if ((ticket.status || "").toLowerCase() === "closed") {
            return;
          }
          html += `

<div class="ticket">

<div>

<h3>
${ticket.company_name}
</h3>

<div>
${ticket.subject}
</div>

<br>

<div class="
priority-${(ticket.priority || "").toLowerCase()}
">

${ticket.priority}

</div>

</div>

<div>

<button
class="open-btn"
onclick="openTicket(${index})"
>
Open Ticket
</button>

</div>

</div>

        `;
        });

        document.getElementById("ticketList").innerHTML = html;
      }

      // function openTicket(index) {
      //   selectedTicket = tickets[index];

      //   document.getElementById("companyName").innerText =
      //     selectedTicket.company_name;

      //   document.getElementById("subject").innerText = selectedTicket.subject;

      //   document.getElementById("customerMessage").innerText =
      //     selectedTicket.customer_message;

      //   document.getElementById("ticketModal").style.display = "block";
      // }

      function openTicket(index) {
        selectedTicket = tickets[index];

        document.getElementById("companyName").innerText =
          selectedTicket.company_name;

        document.getElementById("subject").innerText = selectedTicket.subject;

        document.getElementById("priorityText").innerText =
          selectedTicket.priority || "";

        document.getElementById("statusText").innerText =
          selectedTicket.status || "";

        document.getElementById("customerMessage").innerText =
          selectedTicket.customer_message;

        document.getElementById("agentReply").value =
          selectedTicket.agent_reply || "";

        const status = (selectedTicket.status || "").toLowerCase();

        if (status === "closed") {
          document.getElementById("actionArea").innerHTML = `

    <div style="
    background:#14532d;
    padding:15px;
    border-radius:10px;
    text-align:center;
    font-weight:bold;
    ">
        ✅ No Action Required
    </div>

    `;
        } else {
          document.getElementById("actionArea").innerHTML = `
           <button
class="btn reply-btn"
onclick="sendReply()"
>
Send Reply
</button>

<button
class="btn close-btn"
onclick="closeTicket()"
>
Close Ticket
</button>

<button
class="btn"
onclick="hideModal()"
>
Cancel
</button>
          
          
          `;
        }

        document.getElementById("ticketModal").style.display = "block";
      }

      function hideModal() {
        document.getElementById("ticketModal").style.display = "none";
      }

      function sendReply() {
        const reply = document.getElementById("agentReply").value;

        if (!reply) {
          alert("Please enter reply");

          return;
        }

        alert("Reply Sent Successfully");

        hideModal();
      }
      // function closeTicket() {
      //   selectedTicket.status = "Closed";

      //   hideModal();

      //   loadTickets();

      //   alert("Ticket Closed Successfully");
      // }

      function closeTicket() {
        selectedTicket.status = "Closed";

        hideModal();

        let html = "";

        tickets.forEach((ticket, index) => {
          if ((ticket.status || "").toLowerCase() === "closed") {
            return;
          }

          html += `

<div class="ticket">

<div>

<h3>
${ticket.company_name}
</h3>

<div>
${ticket.subject}
</div>

<br>

<div class="
priority-${(ticket.priority || "").toLowerCase()}
">

${ticket.priority}

</div>

</div>

<div>

<button
class="open-btn"
onclick="openTicket(${index})"
>
Open Ticket
</button>

</div>

</div>

`;
        });

        document.getElementById("ticketList").innerHTML = html;

        alert("Ticket Closed Successfully");
      }

      loadTickets();
    </script>
  </body>
</html>
