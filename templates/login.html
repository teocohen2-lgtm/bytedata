<!DOCTYPE html>
<html>
  <head>
    <title>ByteData Login</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #f8fafc;
        font-family: Inter, Arial, sans-serif;
        padding: 20px;
      }

      .login-card {
        width: 100%;
        max-width: 420px;
        background: white;
        padding: 40px;
        border-radius: 24px;
        border: 1px solid #e5e7eb;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        text-align: center;
      }

      .logo {
        width: 170px;

        margin-bottom: 15px;
      }
      .title {
        color: #111827;
        font-size: 30px;
        font-weight: 700;
      }

      .subtitle {
        color: #6b7280;
        margin-bottom: 30px;
      }

      input {
        width: 100%;
        padding: 15px;
        margin-bottom: 16px;

        background: white;

        color: #111827;

        border: 1px solid #d1d5db;

        border-radius: 12px;

        font-size: 15px;
      }

      input:focus {
        outline: none;
        border-color: #1a73e8;
        box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.15);
      }

      button {
        width: 100%;
        padding: 15px;

        border: none;

        border-radius: 12px;

        background: #1a73e8;

        color: white;

        font-size: 15px;

        font-weight: 600;

        cursor: pointer;

        transition: 0.2s;
      }

      button:hover {
        background: #1557b0;
      }

      .error {
        margin-top: 18px;

        color: #ff4d4d;
      }

      .success {
        margin-top: 18px;

        color: #00ff88;
      }

      .loader {
        display: none;

        margin-top: 20px;
      }

      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #e5e7eb;
        border-top: 4px solid #1a73e8;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: auto;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }

        100% {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 480px) {
        .login-card {
          padding: 28px;
        }

        .logo {
          width: 120px;
        }

        .title {
          font-size: 26px;
        }
      }
    </style>
  </head>

  <body>
    <div class="login-card">
      <img src="/static/logo.png" class="logo" />

      <!-- <div class="title">ByteData</div> -->

      <div class="subtitle">AI Dataset Operations Platform</div>

      <input type="text" id="username" placeholder="Username" />

      <input type="password" id="password" placeholder="Password" />

      <button onclick="loginUser()">Login</button>

      <div class="loader" id="loader">
        <div class="spinner"></div>
      </div>

      <div id="message"></div>
    </div>

    <script>
      async function loginUser() {
        const username = document.getElementById("username").value;

        const password = document.getElementById("password").value;

        const message = document.getElementById("message");

        const loader = document.getElementById("loader");

        message.innerHTML = "";

        loader.style.display = "block";

        try {
          const res = await fetch(
            "/login-user",

            {
              method: "POST",

              headers: {
                "Content-Type": "application/json",
              },

              body: JSON.stringify({
                username,
                password,
              }),
            }
          );

          const result = await res.json();

          if (result.status === "success") {
            message.innerHTML = `

                <div class="success">

                    ${result.message}

                </div>

            `;

            setTimeout(() => {
              window.location.href = result.redirect;
            }, 1000);
          } else {
            message.innerHTML = `

                <div class="error">

                    ${result.message}

                </div>

            `;
          }
        } catch (error) {
          message.innerHTML = `

            <div class="error">

                Server Error

            </div>

        `;
        } finally {
          loader.style.display = "none";
        }
      }
    </script>
  </body>
</html>
