<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Communications Center | ByteData</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap");

      :root {
        --bg-dark: #080b12;
        --sidebar-bg: #0b101a;
        --card-bg: #111723;
        --text-main: #f3f4f6;
        --text-muted: #8b92a5;
        --border-color: #1f2937;
        --primary-blue: #2563eb;
        --accent-green: #10b981;
        --accent-red: #ef4444;
        --accent-orange: #f59e0b;
        --accent-purple: #8b5cf6;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }
      body {
        background-color: var(--bg-dark);
        color: var(--text-main);
        display: flex;
        height: 100vh;
        overflow: hidden;
      }

      /* Sidebar */
      .sidebar {
        width: 260px;
        background-color: var(--sidebar-bg);
        border-right: 1px solid var(--border-color);
        display: flex;
        flex-direction: column;
        padding: 24px 16px;
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 40px;
        padding-left: 12px;
      }
      .logo-icon {
        color: #3b82f6;
        font-size: 28px;
      }
      .nav-menu {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 8px;
        flex-grow: 1;
      }
      .nav-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        border-radius: 8px;
        color: var(--text-muted);
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.2s;
      }
      .nav-item:hover {
        color: var(--text-main);
        background-color: rgba(255, 255, 255, 0.05);
      }
      .nav-item.active {
        background-color: rgba(37, 99, 235, 0.15);
        color: white;
        border: 1px solid rgba(37, 99, 235, 0.3);
      }
      .logout {
        margin-top: auto;
        color: var(--text-muted);
        padding: 12px 16px;
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
        font-weight: 500;
      }

      /* Main Content */
      .main-content {
        flex: 1;
        padding: 32px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }
      .header-title h1 {
        font-size: 24px;
        font-weight: 600;
        margin-bottom: 4px;
      }
      .header-title p {
        color: var(--text-muted);
        font-size: 14px;
      }

      /* KPI Grid */
      .kpi-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
      }
      .kpi-card {
        background-color: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 20px;
      }
      .kpi-card:nth-child(1) {
        border-top: 2px solid var(--primary-blue);
      }
      .kpi-card:nth-child(2) {
        border-top: 2px solid var(--accent-red);
      }
      .kpi-card:nth-child(3) {
        border-top: 2px solid var(--accent-orange);
      }
      .kpi-card:nth-child(4) {
        border-top: 2px solid var(--accent-green);
      }
      .kpi-header {
        display: flex;
        align-items: center;
        gap: 12px;
        color: var(--text-muted);
        font-size: 13px;
        margin-bottom: 12px;
      }
      .kpi-value {
        font-size: 28px;
        font-weight: 700;
      }

      /* Ticket List Styles */
      .ticket-container {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .ticket-card {
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        padding: 20px;
        border-radius: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .priority-high {
        color: var(--accent-red);
        font-size: 12px;
        font-weight: 600;
        background: rgba(239, 68, 68, 0.1);
        padding: 4px 10px;
        border-radius: 20px;
      }
      .priority-medium {
        color: var(--accent-orange);
        font-size: 12px;
        font-weight: 600;
        background: rgba(245, 158, 11, 0.1);
        padding: 4px 10px;
        border-radius: 20px;
      }
      .priority-low {
        color: var(--accent-green);
        font-size: 12px;
        font-weight: 600;
        background: rgba(16, 185, 129, 0.1);
        padding: 4px 10px;
        border-radius: 20px;
      }

      .btn-open {
        background: var(--primary-blue);
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 500;
        font-size: 13px;
      }
      .btn-open:hover {
        background: #1d4ed8;
      }

      /* Modal (Dark Theme) */
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(4px);
        z-index: 999;
        justify-content: center;
        align-items: center;
      }
      .modal-content {
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        width: 600px;
        padding: 30px;
        border-radius: 16px;
        color: var(--text-main);
      }
      .modal-info {
        background: #080b12;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 20px;
        font-size: 14px;
      }
      textarea {
        width: 100%;
        height: 120px;
        background: #080b12;
        border: 1px solid var(--border-color);
        color: white;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 15px;
      }
      .btn-group {
        display: flex;
        gap: 10px;
      }
      .btn {
        padding: 10px 20px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-weight: 600;
      }
      .reply-btn {
        background: var(--accent-green);
        color: white;
      }
      .close-btn {
        background: var(--accent-red);
        color: white;
      }
      .cancel-btn {
        background: var(--border-color);
        color: white;
      }
    </style>
  </head>
  <body>
    <aside class="sidebar">
      <div class="logo">
        <i class="fa-solid fa-chart-simple logo-icon"></i>
        <span>ByteData</span>
      </div>
      <ul class="nav-menu">
        <a href="/dashboard" class="nav-item"
          ><i class="fa-solid fa-border-all"></i> Dashboard</a
        >
        <a href="/" class="nav-item"
          ><i class="fa-solid fa-shield-halved"></i> Data Verification</a
        >
        <a href="/customers" class="nav-item"
          ><i class="fa-solid fa-users"></i> Customers</a
        >
        <a href="/communications" class="nav-item active"
          ><i class="fa-solid fa-comments"></i> Communications</a
        >
        <a href="/operations" class="nav-item"
          ><i class="fa-solid fa-credit-card"></i> Payment Center</a
        >
      </ul>
      <a href="/logout" class="logout"
        ><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a
      >
    </aside>

    <main class="main-content">
      <div class="header-title">
        <h1>Communications Center</h1>
        <p>Manage support tickets and customer inquiries</p>
      </div>

      <div class="kpi-grid">
        <div class="kpi-card">
          <div class="kpi-header">Open Tickets</div>
          <div class="kpi-value" id="openCount">0</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-header">High Priority</div>
          <div class="kpi-value" id="highCount">0</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-header">Medium Priority</div>
          <div class="kpi-value" id="mediumCount">0</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-header">Closed</div>
          <div class="kpi-value" id="closedCount">0</div>
        </div>
      </div>

      <div id="ticketList" class="ticket-container"></div>
    </main>

    <div id="ticketModal" class="modal">
      <div class="modal-content">
        <h2 id="companyName" style="margin-bottom: 15px"></h2>
        <div class="modal-info">
          <p><strong>Subject:</strong> <span id="subject"></span></p>
          <p><strong>Priority:</strong> <span id="priorityText"></span></p>
          <p><strong>Status:</strong> <span id="statusText"></span></p>
        </div>
        <div class="modal-info">
          <p id="customerMessage"></p>
        </div>
        <textarea id="agentReply" placeholder="Type reply here..."></textarea>
        <div id="actionArea" class="btn-group">
          <button class="btn reply-btn" onclick="sendReply()">
            Send Reply
          </button>
          <button class="btn close-btn" onclick="closeTicket()">
            Close Ticket
          </button>
          <button class="btn cancel-btn" onclick="hideModal()">Cancel</button>
        </div>
      </div>
    </div>

    <script>
      let tickets = [];
      let selectedTicket = null;

      function updateKPIs() {
        document.getElementById("openCount").innerText = tickets.filter(
          (t) => (t.status || "").toLowerCase() === "open"
        ).length;
        document.getElementById("highCount").innerText = tickets.filter(
          (t) => (t.priority || "").toLowerCase() === "high"
        ).length;
        document.getElementById("mediumCount").innerText = tickets.filter(
          (t) => (t.priority || "").trim().toLowerCase() === "medium"
        ).length;
        document.getElementById("closedCount").innerText = tickets.filter(
          (t) => (t.status || "").trim().toLowerCase() === "closed"
        ).length;
      }

      async function loadTickets() {
        const res = await fetch("/communications-data");
        tickets = await res.json();
        updateKPIs();

        let html = "";
        tickets.forEach((ticket, index) => {
          if ((ticket.status || "").toLowerCase() === "closed") return;
          html += `
            <div class="ticket-card">
              <div>
                <h3 style="font-size: 16px;">${ticket.company_name}</h3>
                <p style="color: var(--text-muted); font-size: 14px; margin-top: 4px;">${
                  ticket.subject
                }</p>
                <div style="margin-top: 8px;">
                  <span class="priority-${(
                    ticket.priority || ""
                  ).toLowerCase()}">${ticket.priority}</span>
                </div>
              </div>
              <button class="btn-open" onclick="openTicket(${index})">View Details</button>
            </div>
          `;
        });
        document.getElementById("ticketList").innerHTML = html;
      }

      async function openTicket(index) {
        selectedTicket = tickets[index];
        document.getElementById("companyName").innerText =
          selectedTicket.company_name;
        document.getElementById("subject").innerText = selectedTicket.subject;
        document.getElementById("priorityText").innerText =
          selectedTicket.priority || "";
        document.getElementById("statusText").innerText =
          selectedTicket.status || "";
        document.getElementById("customerMessage").innerText =
          selectedTicket.customer_message;
        document.getElementById("agentReply").value =
          selectedTicket.agent_reply || "";

        if ((selectedTicket.status || "").toLowerCase() === "closed") {
          document.getElementById(
            "actionArea"
          ).innerHTML = `<div style="text-align:center; width:100%; color:var(--accent-green)">✅ No Action Required</div>`;
        }

        document.getElementById("ticketModal").style.display = "flex";
      }

      function hideModal() {
        document.getElementById("ticketModal").style.display = "none";
      }

      function sendReply() {
        const reply = document.getElementById("agentReply").value;
        if (!reply) {
          alert("Please enter reply");
          return;
        }
        alert("Reply Sent Successfully");
        hideModal();
      }

      async function closeTicket() {
        if (!selectedTicket) return;
        const res = await fetch("/close-ticket", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message_id: selectedTicket.message_id }),
        });
        const result = await res.json();
        if (result.status === "success") {
          loadTickets();
          hideModal();
        } else {
          alert(result.message);
        }
      }

      loadTickets();
    </script>
  </body>
</html>
